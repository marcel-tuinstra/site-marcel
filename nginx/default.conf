server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /nl {
    try_files /nl/index.html /index.html =404;
  }

  location = /en {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ $uri/index.html /index.html;
  }
}
